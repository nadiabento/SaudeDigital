<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinais Vitais | SaúdeDigital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/exames.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-light bg-light border-bottom d-md-none fixed-top shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand logo-text fw-bold">SaúdeDigital</span>
      <button class="navbar-toggler" type="button" onclick="toggleSidebar()">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <div class="d-flex">
    <nav id="sidebar" class="sidebar d-flex flex-column flex-shrink-0 position-fixed">
      <button class="toggle-btn d-none d-md-flex" onclick="toggleSidebar()">
        <i class="bi bi-chevron-left"></i>
      </button>

      <div class="p-4 d-flex align-items-center justify-content-center justify-content-md-start">
        <i class="bi bi-heart-pulse-fill fs-4 text-primary me-md-2"></i>
        <h4 class="logo-text fw-bold mb-0 hide-on-collapse">SaúdeDigital</h4>
      </div>

  

      <div class="nav flex-column px-2">
        <a href="dashboard.html" class="sidebar-link text-decoration-none p-3">
          <i class="bi bi-house-door me-3"></i>
          <span class="hide-on-collapse">Resumo Geral</span>
        </a>
        <a href="consultas.html" class="sidebar-link text-decoration-none p-3">
          <i class="bi bi-calendar-event me-3"></i>
          <span class="hide-on-collapse">Consultas</span>
        </a>
        <a href="medicacao.html" class="sidebar-link text-decoration-none p-3">
          <i class="bi bi-capsule me-3"></i>
          <span class="hide-on-collapse">Medicação</span>
        </a>
        <a href="exames.html" class="sidebar-link text-decoration-none p-3">
          <i class="bi bi-file-earmark-medical me-3"></i>
          <span class="hide-on-collapse">Exames</span>
        </a>
        <a href="alergias.html" class="sidebar-link text-decoration-none p-3">
          <i class="bi bi-exclamation-triangle me-3"></i>
          <span class="hide-on-collapse">Alergias</span>
        </a>
        <a href="sinais-vitais.html" class="sidebar-link active text-decoration-none p-3">
          <i class="bi bi-heart-pulse me-3"></i>
          <span class="hide-on-collapse">Sinais Vitais</span>
        </a>

        <hr class="text-white opacity-25 mx-3">

        <a href="index.html" class="sidebar-link text-danger text-decoration-none p-3">
          <i class="bi bi-box-arrow-left me-3"></i>
          <span class="hide-on-collapse">Sair</span>
        </a>
      </div>

      <div class="profile-section mt-auto p-4">
        <div class="d-flex align-items-center">
          <div class="profile-img-container">
            <img src="" id="userAvatar" class="rounded-circle" style="width:45px; height:45px;" alt="Perfil">
          </div>
          <div class="ms-3 profile-info">
            <h6 id="userName" style="color: #252f40; font-weight: 700; margin-bottom: 0;">A carregar...</h6>
            <small class="text-muted">Utilizador</small>
          </div>
        </div>
      </div>
    </nav>

    <main class="main-content w-100 p-4">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <h3 class="fw-bold"><i class="bi bi-activity text-primary me-2"></i>Histórico de Sinais Vitais</h3>
            <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#modalSinalVital">
                <i class="bi bi-plus-lg me-2"></i>Novo Registo
            </button>
        </header>

        <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="table-light">
                    <tr>
                      <th>Data</th>
                            <th>Métrica</th>
                            <th>Valor</th>
                            <th class="text-center">Ações</th>
                    </tr>
                 </thead>
                    <tbody id="tabelaSinaisVitais">
                        </tbody>
                </table>
                    <tr>
                      <td colspan="7" class="text-center text-muted py-4">
                        A carregar sinais vitais...
                      </td>
                    </tr>
                  </tbody>
                
              </div>
    </main>
  </div>  

  <div class="modal fade" id="modalSinalVital" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title"><i class="bi bi-heart-pulse-fill me-2"></i>Registar Sinal Vital</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formSinalVital">
                    <input type="hidden" id="svId"> 
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Data e Hora</label>
                        <input type="datetime-local" id="svData" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">O que vai registar?</label>
                        <select id="svTipo" class="form-select" required>
                            <option value="Frequencia Cardiaca">Frequência Cardíaca (BPM)</option>
                            <option value="Glicose">Glicose (mg/dL)</option>
                            <option value="Pressao Arterial">Pressão Arterial</option>
                            <option value="Peso">Peso (kg)</option>
                            <option value="Colesterol">Colesterol (mg/dL)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase" id="labelValor1">Valor</label>
                        <input type="number" step="0.01" id="svValor1" class="form-control" placeholder="Ex: 80" required>
                    </div>
                    <div class="mb-3" id="divValor2" style="display:none;">
                        <label class="form-label text-muted small fw-bold text-uppercase">Valor Secundário (Mínima)</label>
                        <input type="number" step="0.01" id="svValor2" class="form-control" placeholder="Ex: 120">
                    </div>
                    <div id="msgSinalVital"></div> 
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary w-100">Guardar Registo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      if (window.innerWidth <= 768) {
        sidebar.classList.toggle('active');
        sidebar.classList.remove('collapsed');
      } else {
        sidebar.classList.toggle('collapsed');
        sidebar.classList.remove('active');
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
