<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo | SaúdeDigital</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="container-fluid vh-100 p-0">
        <div class="row g-0 h-100">
            
            <div class="col-lg-5 d-none d-lg-flex align-items-center justify-content-center text-white p-5 bg-gradient-custom">
                <div class="max-w-400">
                    <h1 class="display-5 fw-bold mb-4">Junte-se à <br>SaúdeDigital.</h1>
                    <p class="lead opacity-75">Crie o seu perfil biométrico e comece hoje mesmo a gerir o seu histórico clínico de forma segura.</p>
                </div>
            </div>

            <div class="col-lg-7 d-flex align-items-center justify-content-center p-4" style="background-color: #f1f5f9; overflow-y: auto;">
                <div class="w-100 glass-login-card my-5" style="max-width: 540px;">
                    
                    <div class="text-center mb-4">
                        <div class="icon-box-logo-neon">
                            <i class="bi bi-person-plus-fill fs-2"></i>
                        </div>
                        <h2 class="fw-bold text-dark mb-1">Criar Conta</h2>
                        <p class="text-muted small">Preencha os seus dados para começar</p>
                    </div>

                    <form id="registoForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-secondary">Nome Completo</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                                <input type="text" id="regNome" class="form-control bg-light border-start-0" placeholder="O seu nome completo" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small text-secondary">Data de Nascimento</label>
                                <input type="date" id="regDataNasc" class="form-control bg-light" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small text-secondary">Grupo Sanguíneo</label>
                                <select id="regGrupoSang" class="form-select bg-light" required>
                                    <option value="" selected disabled>Selecione...</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-secondary">E-mail</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="regEmail" class="form-control bg-light border-start-0" placeholder="nome@exemplo.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-secondary">Palavra-passe</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" id="regPassword" class="form-control bg-light border-start-0" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary-index w-100 py-3 fw-bold shadow-sm text-white rounded-3 mb-3">
                            Criar Conta
                        </button>
                        
                        <div class="text-center">
                            <p class="text-muted small mb-0">Já tem conta? 
                                <a href="index.html" class="text-primary text-decoration-none fw-bold">Faça Login aqui</a>
                            </p>
                        </div>
                    </form>
                    
                    <div id="mensagemRegisto" class="mt-3"></div>
                </div>
            </div>
            
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
