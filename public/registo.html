<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo | SaúdeDigital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container-fluid vh-100 p-0">
        <div class="row g-0 h-100">
            <div class="col-lg-5 d-none d-lg-flex bg-primary align-items-center justify-content-center text-white p-5 bg-gradient-custom">
                <div class="max-w-400">
                    <h1 class="display-5 fw-bold mb-4">Junte-se à SaúdeDigital.</h1>
                    <p class="lead opacity-75">Crie o seu perfil biométrico e comece hoje mesmo a gerir o seu histórico clínico de forma segura.</p>
                </div>
            </div>

            <div class="col-lg-7 d-flex align-items-center justify-content-center bg-white p-4" style="overflow-y: auto;">
                <div class="w-100 py-5" style="max-width: 500px;">
                    <div class="text-center mb-4">
                        <div class="icon-box-logo mb-3">
                            <i class="bi bi-person-plus-fill text-primary fs-1"></i>
                        </div>
                        <h2 class="fw-bold text-dark">Criar Conta</h2>
                        <p class="text-muted">Preencha os seus dados para começar</p>
                    </div>

                    <form id="registoForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nome Completo</label>
                            <input type="text" id="regNome" class="form-control bg-light" placeholder="O seu nome" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Data de Nascimento</label>
                                <input type="date" id="regDataNasc" class="form-control bg-light" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Grupo Sanguíneo</label>
                                <select id="regGrupoSang" class="form-select bg-light" required>
                                    <option value="" selected disabled>Selecione...</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">E-mail</label>
                            <input type="email" id="regEmail" class="form-control bg-light" placeholder="nome@exemplo.com" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Palavra-passe</label>
                            <input type="password" id="regPassword" class="form-control bg-light" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm mb-3">Criar Conta</button>
                        
                        <div class="text-center">
                            <p class="text-muted">Já tem conta? <a href="index.html" class="text-primary text-decoration-none fw-semibold">Faça Login aqui</a></p>
                        </div>
                    </form>
                    
                    <div id="mensagemRegisto" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
