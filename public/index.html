<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaúdeDigital | Gestão Clínica</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="container-fluid vh-100 p-0">
        <div class="row g-0 h-100">
            
            <div class="col-lg-7 d-none d-lg-flex align-items-center justify-content-center text-white p-5 bg-gradient-custom">
                <div class="max-w-400">
                    <h1 class="display-4 fw-bold mb-4">A sua saúde, <br>agora centralizada.</h1>
                    <p class="lead opacity-75">Monitorize as suas consultas, exames e medicação num único lugar seguro e intuitivo.</p>
                </div>
            </div>

            <div class="col-lg-5 d-flex align-items-center justify-content-center p-4" style="background-color: #f1f5f9;">
                <div class="w-100 glass-login-card" style="max-width: 420px;">
                    
                    <div class="text-center mb-4">
                        <div class="icon-box-logo-neon">
                            <i class="bi bi-heart-pulse-fill fs-2"></i>
                        </div>
                        <h2 class="fw-bold text-dark mb-1">Bem-vindo!</h2>
                        <p class="text-muted small">Introduza os seus dados para aceder à plataforma</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-secondary">E-mail</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" class="form-control bg-light border-start-0" placeholder="nome@exemplo.com" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-secondary">Palavra-passe</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" class="form-control bg-light border-start-0" placeholder="••••••••" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-index w-100 py-3 fw-bold shadow-sm text-white rounded-3">
                            Entrar na Plataforma
                        </button>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted small mb-0">Ainda não tem conta?
                                <a href="registo.html" class="text-primary text-decoration-none fw-bold">Registe-se aqui</a>
                            </p>
                        </div>
                    </form>
                    
                    <div id="message" class="mt-3"></div>
                    
                    <p class="text-center mt-5 text-muted small" style="opacity: 0.6; font-size: 0.75rem;">
                        &copy; 2026 SaúdeDigital - ESTGA PAW
                    </p>
                </div>
            </div>
            
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
