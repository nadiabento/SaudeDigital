<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaúdeDigital | Exames</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/exames.css" />
  </head>

  <body class="bg-light">
    <div class="d-flex">
      <nav
        class="bg-white border-end vh-100 d-none d-md-block sticky-top"
        style="width: 280px"
      >
        <div class="p-4">
          <h4 class="text-primary fw-bold">
            <i class="bi bi-heart-pulse-fill me-2"></i>SaúdeDigital
          </h4>
        </div>
        <ul class="nav flex-column px-3">
          <li class="nav-item mb-2">
            <a href="dashboard.html" class="nav-link text-dark p-3">
              <i class="bi bi-house-door me-2"></i> Resumo Geral
            </a>
          </li>
          <li class="nav-item mb-2">
            <a href="consultas.html" class="nav-link text-dark p-3">
              <i class="bi bi-calendar-event me-2"></i> Consultas
            </a>
          </li>
          <li class="nav-item mb-2">
            <a href="medicacao.html" class="nav-link text-dark p-3">
              <i class="bi bi-capsule me-2"></i> Medicação
            </a>
          </li>
          <li class="nav-item mb-2">
            <a
              href="exames.html"
              class="nav-link active bg-primary text-white rounded-3 p-3 shadow-sm"
            >
              <i class="bi bi-file-earmark-medical me-2"></i> Exames
            </a>
          </li>
          <hr />
          <li class="nav-item">
            <a href="index.html" class="nav-link text-danger p-3">
              <i class="bi bi-box-arrow-left me-2"></i> Sair
            </a>
          </li>
        </ul>
      </nav>

      <main class="flex-grow-1 p-4">
        <header class="d-flex justify-content-between align-items-center mb-5">
          <div>
            <h2 class="fw-bold">Registo de Exames</h2>
            <p class="text-muted">
              Organize os seus relatórios e exporte o seu histórico clínico.
            </p>
          </div>
          <div class="d-flex gap-2">
            <button
              class="btn btn-outline-secondary shadow-sm px-3"
              onclick="exportarJSON()"
            >
              <i class="bi bi-code-slash me-2"></i>JSON
            </button>
            <button
              class="btn btn-primary shadow-sm px-4 rounded-pill"
              onclick="window.print()"
            >
              <i class="bi bi-file-earmark-pdf me-2"></i>Exportar PDF
            </button>
          </div>
        </header>

        <div class="row g-4">
          <div class="col-lg-5">
            <div class="card border-0 shadow-sm mb-4 card-atalhos">
              <div class="card-body p-3">
                <div class="row g-2">
                  <div class="col-6">
                    <button
                      class="btn btn-atalho w-100 p-3"
                      data-bs-toggle="modal"
                      data-bs-target="#modalNovaClasse"
                    >
                      <i
                        class="bi bi-folder-plus text-primary d-block mb-2 fs-4"
                      ></i>
                      <span class="fw-bold">Nova Categoria</span>
                    </button>
                  </div>
                  <div class="col-6">
                    <button
                      class="btn btn-atalho w-100 p-3"
                      data-bs-toggle="modal"
                      data-bs-target="#modalNovoTipo"
                    >
                      <i
                        class="bi bi-file-earmark-plus text-primary d-block mb-2 fs-4"
                      ></i>
                      <span class="fw-bold">Novo Tipo</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="card border-0 shadow-sm p-4">
              <h5 class="fw-bold mb-4">Registar Novo Exame</h5>
              <form id="formExame">
                <div class="mb-3 position-relative">
                  <label class="form-label fw-semibold">Classe do Exame</label>
                  <input
                    type="text"
                    class="form-control bg-light border-0 p-3"
                    id="classeExameInput"
                    placeholder="Escreva a classe..."
                    autocomplete="off"
                  />
                  <ul
                    id="sugestoesClasse"
                    class="list-group shadow-sm custom-autocomplete-list"
                  ></ul>
                </div>

                <div class="mb-3 position-relative">
                  <label class="form-label fw-semibold">Tipo de Exame</label>
                  <input
                    type="text"
                    class="form-control bg-light border-0 p-3"
                    id="tipoExameInput"
                    placeholder="Selecione primeiro a classe..."
                    autocomplete="off"
                    disabled
                  />
                  <ul
                    id="sugestoesTipo"
                    class="list-group shadow-sm custom-autocomplete-list"
                  ></ul>

                  <input type="hidden" id="idTipoSelecionado" />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold"
                    >Data de Realização</label
                  >
                  <input
                    type="date"
                    class="form-control bg-light border-0 p-3"
                    id="dataExame"
                    required
                  />
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold"
                    >Observações Médicas</label
                  >
                  <textarea
                    class="form-control bg-light border-0 p-3"
                    id="observacoes"
                    rows="3"
                    placeholder="Ex: Resultado dentro dos parâmetros normais."
                  ></textarea>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold"
                    >Anexar Relatório (PDF)</label
                  >
                  <div class="upload-box">
                    <i class="bi bi-cloud-arrow-up-fill text-primary fs-1"></i>
                    <input
                      type="file"
                      name="relatorio"
                      class="form-control mt-2"
                      accept=".pdf"
                    />
                  </div>
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 py-3 fw-bold shadow-sm"
                >
                  <i class="bi bi-check-circle me-2"></i>Guardar Registo
                </button>
              </form>
            </div>
          </div>

          <div class="col-lg-7">
            <div class="card border-0 shadow-sm p-4 h-100">
              <h5 class="fw-bold mb-4">Histórico Recente</h5>
              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="table-light">
                    <tr>
                      <th
                        onclick="ordenarTabela('exame')"
                        style="cursor: pointer"
                      >
                        Exame
                        <i
                          id="setaExame"
                          class="bi bi-arrow-down-up ms-1 small text-muted"
                        ></i>
                      </th>
                      <th
                        onclick="ordenarTabela('data')"
                        style="cursor: pointer"
                      >
                        Data
                        <i
                          id="setaData"
                          class="bi bi-arrow-down-up ms-1 small text-muted"
                        ></i>
                      </th>
                      <th>Documento</th>
                      <th class="text-end">Ações</th>
                    </tr>
                  </thead>
                  <tbody id="tabelaExames"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div
      class="modal fade"
      id="modalNovaClasse"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content border-0 shadow-lg"
          style="border-radius: 20px"
        >
          <div class="modal-header border-0 pt-4 px-4">
            <div class="bg-primary bg-opacity-10 p-2 rounded-3 me-3">
              <i class="bi bi-folder-plus text-primary"></i>
            </div>
            <h5 class="modal-title fw-bold">Nova Categoria de Exame</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body px-4 pb-4">
            <div class="form-floating mb-2">
              <input
                type="text"
                id="inputNovaClasse"
                class="form-control border-0 bg-light rounded-3"
                placeholder="Nome"
              />
              <label for="inputNovaClasse">Nome da Categoria</label>
            </div>
          </div>
          <div class="modal-footer border-0 px-4 pb-4">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">
              Cancelar
            </button>

            <button
              type="button"
              class="btn btn-primary"
              onclick="adicionarClasse()"
            >
              Criar Agora
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalNovoTipo" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content border-0 shadow-lg"
          style="border-radius: 20px"
        >
          <div class="modal-header border-0 pt-4 px-4">
            <div class="bg-primary bg-opacity-10 p-2 rounded-3 me-3">
              <i class="bi bi-file-earmark-plus text-primary"></i>
            </div>
            <h5 class="modal-title fw-bold">Novo Tipo de Exame</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body px-4">
            <div class="mb-3">
              <label class="form-label small fw-bold text-muted"
                >Categoria Pai</label
              >
              <select
                class="form-select border-0 bg-light p-3 rounded-3"
                id="selectCategoriaPai"
              ></select>
            </div>
            <div class="mb-4">
              <label class="form-label small fw-bold text-muted"
                >Nome do Exame</label
              >
              <input
                type="text"
                id="inputNovoTipo"
                class="form-control border-0 bg-light p-3 rounded-3"
                placeholder="Ex: TAC"
              />
            </div>
          </div>
          <div class="modal-footer border-0 px-4 pb-4">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">
              Voltar
            </button>

            <button
              type="button"
              class="btn btn-primary fw-bold"
              onclick="adicionarTipo()"
            >
              Confirmar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/exames.js"></script>
  </body>
</html>
