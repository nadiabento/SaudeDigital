<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaúdeDigital | Alergias</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/exames.css" />
  </head>

  <body class="bg-light">
    <div class="d-flex">
      <nav
        class="bg-white border-end vh-100 d-none d-md-block sticky-top"
        style="width: 280px"
      >
        <div class="p-4">
          <h4 class="text-primary fw-bold">
            <i class="bi bi-heart-pulse-fill me-2"></i>SaúdeDigital
          </h4>
        </div>
        <ul class="nav flex-column px-3">
          <li class="nav-item mb-2">
            <a href="dashboard.html" class="nav-link text-dark p-3"
              ><i class="bi bi-house-door me-2"></i> Resumo Geral</a
            >
          </li>
          <li class="nav-item mb-2">
            <a href="consultas.html" class="nav-link text-dark p-3"
              ><i class="bi bi-calendar-event me-2"></i> Consultas</a
            >
          </li>
          <li class="nav-item mb-2">
            <a href="medicacao.html" class="nav-link text-dark p-3"
              ><i class="bi bi-capsule me-2"></i> Medicação</a
            >
          </li>
          <li class="nav-item mb-2">
            <a href="exames.html" class="nav-link text-dark p-3"
              ><i class="bi bi-file-earmark-medical me-2"></i> Exames</a
            >
          </li>
          <li class="nav-item mb-2">
            <a
              href="alergias.html"
              class="nav-link active bg-primary text-white rounded-3 p-3 shadow-sm"
            >
              <i class="bi bi-exclamation-triangle me-2"></i> Alergias
            </a>
          </li>
          <hr />
          <li class="nav-item">
            <a href="index.html" class="nav-link text-danger p-3"
              ><i class="bi bi-box-arrow-left me-2"></i> Sair</a
            >
          </li>
        </ul>
      </nav>

      <main class="flex-grow-1 p-4">
        <header class="d-flex justify-content-between align-items-center mb-5">
          <div>
            <h2 class="fw-bold">Gestão de Alergias</h2>
            <p class="text-muted">
              Mantenha o seu perfil clínico atualizado para sua segurança.
            </p>
          </div>
        </header>

        <div class="row g-4">
          <div class="col-lg-5">
            <div class="card border-0 shadow-sm p-4">
              <h5 class="fw-bold mb-4 text-primary">Registar Nova Alergia</h5>
              <form id="formAlergia">
                <div class="mb-3 position-relative">
                  <label class="form-label fw-semibold"
                    >Substância / Medicamento</label
                  >
                  <input
                    type="text"
                    class="form-control bg-light border-0 p-3"
                    id="substanciaInput"
                    placeholder="Ex: Penicilina, Marisco..."
                    list="listaMedicamentos"
                    required
                  />
                  <datalist id="listaMedicamentos"></datalist>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold">Gravidade</label>
                  <select
                    class="form-select bg-light border-0 p-3"
                    id="gravidadeSelect"
                    required
                  >
                    <option value="Leve">Leve</option>
                    <option value="Moderada" selected>Moderada</option>
                    <option value="Grave">Grave</option>
                    <option value="Crítica">Crítica</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold"
                    >Observações / Reação</label
                  >
                  <textarea
                    class="form-control bg-light border-0 p-3"
                    id="observacoesAlergia"
                    rows="3"
                    placeholder="Descreva os sintomas..."
                  ></textarea>
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 py-3 fw-bold shadow-sm"
                >
                  <i class="bi bi-check-circle me-2"></i>Guardar Alergia
                </button>
              </form>
            </div>
          </div>

          <div class="col-lg-7">
            <div class="card border-0 shadow-sm p-4 h-100">
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <h5 class="fw-bold m-0">Minhas Alergias</h5>
                <div id="acoesMassaAlergias" class="d-none">
                  <button
                    class="btn btn-outline-danger btn-sm"
                    onclick="eliminarSelecionadas()"
                  >
                    <i class="bi bi-trash me-1"></i> Eliminar Selecionadas
                  </button>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="table-light">
                    <tr>
                      <th style="width: 40px">
                        <input
                          type="checkbox"
                          id="checkAllAlergias"
                          class="form-check-input"
                          onclick="toggleTodasAlergias(this)"
                        />
                      </th>
                      <th
                        onclick="ordenarAlergias('substancia')"
                        style="cursor: pointer"
                      >
                        Substância
                        <i
                          class="bi bi-arrow-down-up ms-1 small text-muted"
                        ></i>
                      </th>
                      <th
                        onclick="ordenarAlergias('gravidade')"
                        style="cursor: pointer"
                      >
                        Gravidade
                        <i
                          class="bi bi-arrow-down-up ms-1 small text-muted"
                        ></i>
                      </th>
                      <th>Reação</th>
                      <th class="text-end">Ações</th>
                    </tr>
                  </thead>
                  <tbody id="tabelaAlergias"></tbody>
                </table>
              </div>

              <div
                id="paginacaoAlergias"
                class="mt-3 d-flex justify-content-center"
              ></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div
      class="modal fade"
      id="modalEditarAlergia"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content border-0 shadow-lg"
          style="border-radius: 20px"
        >
          <div class="modal-header border-0 pt-4 px-4">
            <h5 class="modal-title fw-bold">
              <i class="bi bi-pencil-square text-primary me-2"></i>Editar
              Alergia
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body p-4">
            <input type="hidden" id="editAlergiaId" />
            <div class="mb-3">
              <label class="form-label fw-bold small">Gravidade</label>
              <select
                id="editGravidade"
                class="form-select bg-light border-0 p-3"
              >
                <option value="Leve">Leve</option>
                <option value="Moderada">Moderada</option>
                <option value="Grave">Grave</option>
                <option value="Crítica">Crítica</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold small"
                >Observações / Reação</label
              >
              <textarea
                id="editObservacoesAlergia"
                class="form-control bg-light border-0 p-3"
                rows="4"
              ></textarea>
            </div>
          </div>
          <div class="modal-footer border-0 p-4">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-primary fw-bold px-4"
              onclick="guardarEdicaoAlergia()"
            >
              Atualizar Registo
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/alergias.js"></script>
  </body>
</html>
