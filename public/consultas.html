<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultas | SaúdeDigital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <style>
      body { font-family: "Inter", sans-serif; }
      .nav-link.active { background-color: #0d6efd !important; color: white !important; }
      .transition-hover:hover { 
        background-color: #f8f9fa !important; 
        transform: translateY(-2px); 
        transition: all 0.2s ease; 
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="d-flex">
      <nav class="bg-white border-end vh-100 d-none d-md-block sticky-top" style="width: 280px">
        <div class="p-4">
          <h4 class="text-primary fw-bold"><i class="bi bi-heart-pulse-fill me-2"></i>SaúdeDigital</h4>
        </div>
        <ul class="nav flex-column px-3">
          <li class="nav-item mb-2">
            <a href="dashboard.html" class="nav-link text-dark p-3"><i class="bi bi-house-door me-2"></i> Resumo Geral</a>
          </li>
          <li class="nav-item mb-2">
            <a href="consultas.html" class="nav-link active rounded-3 p-3 shadow-sm"><i class="bi bi-calendar-event me-2"></i> Consultas</a>
          </li>
          <li class="nav-item mb-2">
            <a href="medicacao.html" class="nav-link text-dark p-3"><i class="bi bi-capsule me-2"></i> Medicação</a>
          </li>
          <li class="nav-item mb-2">
            <a href="exames.html" class="nav-link text-dark p-3"><i class="bi bi-file-earmark-medical me-2"></i> Exames</a>
          </li>
          <hr />
          <li class="nav-item">
            <a href="index.html" class="nav-link text-danger p-3"><i class="bi bi-box-arrow-left me-2"></i> Sair</a>
          </li>
        </ul>
      </nav>

      <main class="flex-grow-1 p-4">
        <header class="d-flex justify-content-between align-items-center mb-5">
          <div>
            <h2 class="fw-bold">Registo de Consultas</h2>
            <p class="text-muted">Gira as suas marcações e consulte os pareceres médicos.</p>
          </div>
        </header>

        <div class="row g-4">
          <div class="col-lg-5">
            <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px">
              <div class="card-body p-3">
                <div class="row g-2">
                  <div class="col-6">
                    <button class="btn btn-light w-100 p-3 text-center transition-hover border-0 shadow-sm" style="background-color: #ffffff; border-radius: 10px; border: 1px solid #f0f0f0 !important;" data-bs-toggle="modal" data-bs-target="#modalNovoMedico">
                      <i class="bi bi-person-plus text-primary d-block mb-2 fs-4"></i>
                      <span class="fw-bold text-dark d-block small">Novo Médico</span>
                    </button>
                  </div>
                  <div class="col-6">
                    <button class="btn btn-light w-100 p-3 text-center transition-hover border-0 shadow-sm" style="background-color: #ffffff; border-radius: 10px; border: 1px solid #f0f0f0 !important;" data-bs-toggle="modal" data-bs-target="#modalNovaUnidade">
                      <i class="bi bi-building-add text-primary d-block mb-2 fs-4"></i>
                      <span class="fw-bold text-dark d-block small">Nova Unidade</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="card border-0 shadow-sm p-4">
              <h5 class="fw-bold mb-4">Registar Nova Consulta</h5>
              <form id="formConsulta">
                
                <div class="mb-3">
                  <label class="form-label fw-semibold text-muted small">Médico</label>
                  <select class="form-select bg-light border-0 p-3" id="medicoInput" onchange="autoPreencherMedico()" required>
                    <option value="" selected disabled>A carregar médicos...</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold text-muted small">Especialidade</label>
                  <select class="form-select bg-light border-0 p-3 text-muted" id="especialidadeInput" disabled required>
                    <option value="" selected disabled>Preenchimento automático...</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold text-muted small">Unidade de Saúde</label>
                  <select class="form-select bg-light border-0 p-3 text-muted" id="unidadeInput" disabled required>
                    <option value="" selected disabled>Preenchimento automático...</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold text-muted small">Data e Hora</label>
                  <input type="datetime-local" class="form-control bg-light border-0 p-3" id="dataHoraInput" required />
                </div>
                <div class="mb-4">
                  <label class="form-label fw-semibold text-muted small">Notas Médicas</label>
                  <textarea class="form-control bg-light border-0 p-3" id="notasConsulta" rows="3" placeholder="Resumo do parecer médico..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                  <i class="bi bi-check-circle me-2"></i>Guardar Registo
                </button>
              </form>
            </div>
          </div>

          <div class="col-lg-7">
            <div class="card border-0 shadow-sm p-4 h-100">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0">As Minhas Consultas</h5>
                <div id="acoesMassa" class="d-none">
                  <button class="btn btn-danger btn-sm shadow-sm px-3" onclick="eliminarSelecionados()">
                    <i class="bi bi-trash me-1"></i> Eliminar
                  </button>
                </div>
              </div>

              <ul class="nav nav-pills mb-4" id="abasConsultas">
                <li class="nav-item me-2">
                  <button class="nav-link active px-4 rounded-pill fw-semibold" id="tab-futuras" onclick="mudarSeparador('futuras')">Próximas</button>
                </li>
                <li class="nav-item">
                  <button class="nav-link px-4 rounded-pill fw-semibold text-muted" id="tab-anteriores" onclick="mudarSeparador('anteriores')">Anteriores</button>
                </li>
              </ul>

              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="table-light">
                    <tr class="small text-muted">
                      <th style="width: 40px;">
                        <input type="checkbox" class="form-check-input border-secondary" id="checkAll" onclick="toggleTodos(this)">
                      </th>
                      <th>Especialidade</th>
                      <th>Data</th>
                      <th>Médico</th>
                      <th>Local</th>
                      <th class="text-end">Ações</th>
                    </tr>
                  </thead>
                  <tbody id="tabelaConsultas">
                    </tbody>
                </table>
              </div>
              <div id="paginacaoContainer" class="d-flex justify-content-center mt-3"></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="modal fade" id="modalNovoMedico" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px">
          <div class="modal-header border-0 pt-4 px-4">
            <h5 class="modal-title fw-bold">Novo Médico</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body px-4">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Nome do Médico</label>
                <input type="text" id="inputNomeMedico" class="form-control border-0 bg-light p-3" placeholder="Ex: Dr. Carlos Mendes" />
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Especialidade</label>
                <select id="inputEspMedico" class="form-select border-0 bg-light p-3">
                    <option value="" selected disabled>A carregar...</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Unidade de Saúde</label>
                <select id="inputUniMedico" class="form-select border-0 bg-light p-3">
                    <option value="" selected disabled>A carregar...</option>
                </select>
            </div>
          </div>
          <div class="modal-footer border-0 px-4 pb-4">
            <button type="button" class="btn btn-primary fw-bold py-2 px-4 rounded-3" onclick="adicionarMedico()">Adicionar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalNovaUnidade" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px">
          <div class="modal-header border-0 pt-4 px-4">
            <h5 class="modal-title fw-bold">Nova Unidade</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body px-4">
            <label class="form-label small fw-bold text-muted">Nome da Unidade</label>
            <input type="text" id="inputNomeUnidade" class="form-control border-0 bg-light p-3" placeholder="Ex: Hospital da Luz" />
          </div>
          <div class="modal-footer border-0 px-4 pb-4">
            <button type="button" class="btn btn-primary fw-bold py-2 px-4 rounded-3" onclick="adicionarUnidade()">Adicionar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalEditarConsulta" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px">
          <div class="modal-header border-0 pt-4 px-4">
            <h5 class="modal-title fw-bold">Editar Consulta</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body px-4">
            <input type="hidden" id="editConsultaId">
            
            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Nova Data e Hora</label>
              <input type="datetime-local" id="editDataHora" class="form-control bg-light border-0 p-3">
            </div>
            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Notas Médicas</label>
              <textarea id="editNotas" class="form-control bg-light border-0 p-3" rows="4"></textarea>
            </div>
          </div>
          <div class="modal-footer border-0 px-4 pb-4">
            <button type="button" class="btn btn-warning fw-bold py-2 px-4 rounded-3 text-dark" onclick="guardarEdicao()">Guardar Alterações</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/consultas.js"></script>
  </body>
</html>
