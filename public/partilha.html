<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaúdeDigital | Portal do Médico</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="/css/partilha.css">
</head>
<body class="bg-gradient-custom">

    <div class="container-partilha animate-card">
        <div class="header-clinico">
            <h2 class="fw-bold mb-1"><i class="bi bi-shield-pulse me-2"></i>SaúdeDigital</h2>
            <p class="opacity-75 mb-0">Portal de Partilha Clínica para Profissionais</p>
        </div>

        <div class="corpo-partilha">
            <div class="nota-informativa">
                <i class="bi bi-info-circle-fill me-3 fs-5"></i>
                <div>
                    <strong>Acesso Temporário:</strong> Os documentos abaixo foram partilhados pelo paciente para fins de consulta imediata.
                </div>
            </div>

            <h5 class="fw-bold mb-4 text-secondary">Documentos Disponíveis</h5>
            <div id="listaExames"></div>
        </div>

        <div class="footer-secure">
            <i class="bi bi-lock-fill me-1"></i> Segurança SaúdeDigital &copy; 2026
        </div>
    </div>

    <div class="modal fade" id="modalPDF" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-primary" id="tituloExame">Documento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="framePDF" src="" width="100%" height="85vh" style="border: none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/partilha.js"></script>
</body>
</html>
