<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaúdeDigital | Portal do Médico</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Link para o teu CSS externo -->
    <link rel="stylesheet" href="/css/partilha.css">
</head>
<body>

    <div class="container-partilha">
        <div class="header-clinico">
            <h2 class="fw-bold mb-1"><i class="bi bi-shield-pulse me-2"></i>SaúdeDigital</h2>
            <p class="opacity-75 mb-0">Portal de Partilha Clínica para Profissionais</p>
        </div>

        <div class="corpo-partilha">
            <div class="nota-informativa">
                <i class="bi bi-info-circle-fill me-3 fs-5"></i>
                <div>
                    <strong>Acesso Temporário:</strong> Os documentos abaixo foram partilhados pelo paciente para fins de consulta imediata.
                </div>
            </div>

            <h5 class="fw-bold mb-4 text-secondary">Documentos Disponíveis</h5>
            <div id="listaExames"></div>
        </div>

        <div class="footer-secure">
            <i class="bi bi-lock-fill me-1"></i> Segurança SaúdeDigital &copy; 2026
        </div>
    </div>

    <!-- Modal PDF -->
    <div class="modal fade" id="modalPDF" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-primary" id="tituloExame">Documento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="framePDF" src="" width="100%" height="80vh" style="border: none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
async function carregarDados() {
    const path = window.location.pathname.replace(/\/$/, ""); 
    const token = path.split('/').pop();
    const container = document.getElementById('listaExames');

    try {
        const response = await fetch(`/api/exames/dados-partilha/${token}`);
        if (!response.ok) throw new Error('Falha na resposta do servidor');
        
        const exames = await response.json();
        
        if (exames.length === 0) {
            container.innerHTML = '<p class="text-center text-muted">Nenhum exame encontrado.</p>';
            return;
        }

        container.innerHTML = exames.map(ex => `
            <div class="exame-card">
                <!-- Cabeçalho do Cartão: Título e Botão lado a lado -->
                <div class="d-flex justify-content-between align-items-start w-100">
                    <div>
                        <h5 class="fw-bold mb-2 text-dark">${ex.nome}</h5>
                        <span class="data-badge">
                            <i class="bi bi-calendar3 me-1"></i> ${new Date(ex.data_exame).toLocaleDateString('pt-PT')}
                        </span>
                    </div>
                    <button class="btn-visualizar shadow-sm" onclick="verPDF('${ex.resultado}', '${ex.nome}')">
                        <i class="bi bi-file-earmark-pdf-fill me-2"></i>Ver PDF
                    </button>
                </div>

                <!-- Secção da Descrição: Só aparece se existir conteúdo -->
                ${ex.observacoes ? `
                    <div class="mt-3 pt-3 border-top">
                        <p class="mb-0 text-muted" style="font-size: 0.9rem;">
                            <strong class="text-secondary"><i class="bi bi-chat-left-text me-1"></i> Observações:</strong><br>
                            ${ex.observacoes}
                        </p>
                    </div>
                ` : ''}
            </div>
        `).join('');

    } catch (err) {
        console.error("Erro ao carregar dados:", err);
        container.innerHTML = '<p class="text-center text-danger">Erro ao carregar os exames. Verifique a validade do link.</p>';
    }
}

function verPDF(file, nome) {
    const frame = document.getElementById('framePDF');
    frame.src = `/uploads/${file}`;
    document.getElementById('tituloExame').innerText = nome;
    const myModal = new bootstrap.Modal(document.getElementById('modalPDF'));
    myModal.show();
}

carregarDados();

    </script>
</body>
</html>
